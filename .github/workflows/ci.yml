name: CI

on:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic numpy scikit-learn
        
    - name: Verify Python code
      run: |
        cd backend
        python -c "from main import app; print('Backend OK')"
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Verify Node code
      run: |
        cd frontend
        cat package.json | head -5
        echo "Frontend OK"
        
    - name: Success
      run: |
        echo "✅ All checks passed!"
